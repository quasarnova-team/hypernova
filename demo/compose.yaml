# The DIP-replacement topology, miniaturized:
#
#   fieldnet (technical network)          officenet (general network)
#   ┌──────────────────────┐          ┌─────────────────────┐
#   │ field-server (C++)   │          │ consumer            │
#   │  supernova (C++)     │          │  hypernova sub      │
#   │  multicast 239.0.0.5 │          │  by name, unicast   │
#   └──────────┬───────────┘          └──────────▲──────────┘
#              │            relay (pinhole)      │
#              └───────────► joins fieldnet ─────────┘
#                            re-emits to officenet
#   registry+browser: feet in both networks, listens on fieldnet,
#   serves lookups per network, web UI on http://localhost:4850
#
# Start with demo/run_demo.sh (it builds the image, registers the
# publication and verifies data end to end).

# note: docker orders container interfaces lexicographically by network name;
# the field side must sort first (fieldnet < officenet) so multicast rides eth0.
networks:
  fieldnet:
    ipam:
      config: [{subnet: "172.28.0.0/24"}]
  officenet:
    ipam:
      config: [{subnet: "172.29.0.0/24"}]

services:
  field-server:
    image: ghcr.io/quasar-team/quasar-uasdk:latest
    platform: linux/amd64
    volumes:
      - ${SUPERNOVA_TREE:?point SUPERNOVA_TREE at a built supernova publisher tree}:/cell/supernova
    working_dir: /cell/supernova/build/bin
    command: ./OpcUaServer
    networks: [fieldnet]

  registry:
    image: hypernova:demo
    build:
      context: ..
      dockerfile: demo/Dockerfile
    command: ["registry", "--store", ""]
    networks: [fieldnet, officenet]
    ports:
      - "4850:4850"

  relay:
    image: hypernova:demo
    command: ["relay", "/config/relay.json"]
    volumes:
      - ./relay.json:/config/relay.json:ro
    networks:
      fieldnet: {}
      officenet: {}
    ports:
      - "4860:4860"

  consumer:
    image: hypernova:demo
    command: ["sub", "site/area1/demo/env",
              "--registry", "http://registry:4850",
              "--network", "officenet", "--timeout", "3600"]
    restart: on-failure
    networks:
      officenet:
        ipv4_address: 172.29.0.20
    depends_on: [registry]
